syntax = "proto3";

package agentbridge.v1;

service AgentBridgeService {
  rpc Probe(ProbeRequest) returns (ProbeResponse);
  rpc Ask(AskRequest) returns (AskResponse);
  rpc AskStream(AskRequest) returns (stream AskEvent);
  rpc PrepareSync(SyncPrepareRequest) returns (SyncPrepareResponse);
  rpc UploadFileChunk(stream FileChunkUploadRequest) returns (FileChunkUploadResponse);
  rpc CommitSync(SyncCommitRequest) returns (SyncCommitResponse);
  rpc GetSyncStatus(SyncStatusRequest) returns (SyncStatusResponse);
}

message ProbeRequest {
  string server_id = 1;
  string plugin_name = 2;
  string plugin_version = 3;
  int32 protocol_version = 4;
  string server_instance_id = 5;
}

message ProbeResponse {
  bool ack = 1;
  string message = 2;
  string backend_name = 3;
  string backend_version = 4;
  int32 protocol_version = 5;
  repeated string capabilities = 6;
}

message ServerPlugin {
  string name = 1;
  string version = 2;
  bool enabled = 3;
}

message AskRequest {
  string server_id = 1;
  string player_id = 2;
  string player_name = 3;
  string question = 4;
  string request_id = 5;
  int64 timestamp = 6;
  repeated ServerPlugin installed_plugins = 7;
  string server_instance_id = 8;
}

message AskResponse {
  string request_id = 1;
  string answer = 2;
  string citations_summary = 3;
  string backend_trace_id = 4;
}

message AskProgress {
  string request_id = 1;
  string stage = 2;
  string message = 3;
  int64 elapsed_ms = 4;
  int32 sequence = 5;
}

message AskEvent {
  oneof event {
    AskProgress progress = 1;
    AskResponse response = 2;
  }
}

message FileManifestEntry {
  string relative_path = 1;
  int64 size = 2;
  string sha256 = 3;
  int64 last_modified_epoch_ms = 4;
}

message RejectedPath {
  string relative_path = 1;
  string reason = 2;
}

message SyncPrepareRequest {
  string server_id = 1;
  repeated FileManifestEntry manifest = 2;
  string server_instance_id = 3;
}

message SyncPrepareResponse {
  string sync_id = 1;
  repeated string required_paths = 2;
  repeated RejectedPath rejected_paths = 3;
}

message FileChunkUploadRequest {
  string sync_id = 1;
  string relative_path = 2;
  int32 chunk_index = 3;
  int32 total_chunks = 4;
  bytes content_bytes = 5;
  string sha256 = 6;
}

message FileChunkUploadResponse {
  string sync_id = 1;
  string relative_path = 2;
  int64 received_bytes = 3;
  int32 received_chunks = 4;
  bool sha256_verified = 5;
  string message = 6;
}

message SyncCommitRequest {
  string sync_id = 1;
  string server_id = 2;
  repeated string uploaded_paths = 3;
  string server_instance_id = 4;
}

message SyncCommitResponse {
  string sync_id = 1;
  int32 accepted_count = 2;
  int32 indexed_count = 3;
  bool refresh_started = 4;
  string message = 5;
}

enum SyncState {
  SYNC_STATE_UNSPECIFIED = 0;
  SYNC_STATE_PENDING = 1;
  SYNC_STATE_UPLOADING = 2;
  SYNC_STATE_INDEXING = 3;
  SYNC_STATE_COMPLETED = 4;
  SYNC_STATE_FAILED = 5;
}

message SyncStatusRequest {
  string sync_id = 1;
}

message SyncStatusResponse {
  string sync_id = 1;
  SyncState state = 2;
  int32 accepted_count = 3;
  int32 indexed_count = 4;
  bool refresh_started = 5;
  string message = 6;
  int64 updated_at_epoch_ms = 7;
  int32 required_file_count = 8;
  int32 uploaded_file_count = 9;
  int64 total_upload_bytes = 10;
  int64 uploaded_bytes = 11;
  string current_upload_path = 12;
  int32 refresh_total_bundles = 13;
  int32 refresh_completed_bundles = 14;
  int32 refresh_failed_bundles = 15;
  string current_refresh_bundle = 16;
  string current_refresh_phase = 17;
}
