[paths]
lance_db_dir = "data/plugins_vector_db"
model_cache_dir = ".cache/models"

[vector_store]
lance_table_name = "plugins_docs"
expected_embedding_dimension = 1024
rewrite_history_turns = 4
retrieval_top_k = 8
answer_top_k = 4
citation_preview_chars = 200

[jina]
embeddings_url = "https://api.jina.ai/v1/embeddings"
embeddings_model = "jina-embeddings-v5-text-small"
embeddings_task = "retrieval.query"

[deepseek]
model = "deepseek-chat"
chat_url = "https://api.deepseek.com/chat/completions"

[plugin_config_agent]
model = "deepseek-chat"

[memory_maintenance_agent]
model = "deepseek-chat"

[reranker]
enabled = true
model_name_or_path = "maidalun1020/bce-reranker-base_v1"

[memory]
enabled = false
db_path = ".cache/memory/memory.sqlite3"
recall_limit = 5
min_confidence = 0.75
consolidation_turns = 4

[plugin_semantic_agent]
enabled = true
mc_servers_root = "mc_servers"
model = "deepseek-chat"
scan_on_startup = true
refresh_interval_seconds = 1800
max_file_chars = 12000
max_files_per_plugin = 20

[semantic_memory_store]
db_dir = "data/semantic_memory_vector_db"
table_name = "semantic_memory_contexts"
top_k = 8
preview_chars = 220

[plugin_config_store]
db_dir = "data/plugin_config_vector_db"
table_name = "plugin_config_docs"
top_k = 6
preview_chars = 220
summary_chars = 500
