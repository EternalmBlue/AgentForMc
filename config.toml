# This file only contains overrides.
# Secrets stay in .env.
#
# Common local deployment:
# - You usually do not need to change this file
# - gRPC listens on 127.0.0.1:50051 by default
# - Minecraft config sync and semantic refresh are enabled by default
# - Uploaded server configs are stored under ./mc_servers
# - Plugin docs vectors are stored under ./data/plugin_docs_vector_db
# - Uploaded server config semantics are stored under ./data/server_config_semantic_vector_db
# - User long-term semantic memory is stored under ./data/user_semantic_memory.sqlite3 when enabled
# - server.id to server instance bindings are stored under ./data/server_instance_bindings.json
# - Embeddings use Zhipu embedding-3 over an OpenAI-compatible endpoint
# - Embedding dimensions follow embedding.dimensions

[reranker]
enabled = true

# Only add the sections below when you really need them.
#
# Override the Zhipu embedding endpoint or model:
# [embedding]
# url = "https://open.bigmodel.cn/api/paas/v4/embeddings"
# model = "embedding-3"
# dimensions = 1024
#
# Important:
# - embedding.dimensions must be one of 256, 512, 1024, 2048
# - If you change the dimension, rebuild the existing vector tables
#
# Change where plugin docs vectors are stored:
# [paths]
# plugin_docs_vector_db_dir = "data/plugin_docs_vector_db"
#
# Change plugin docs retrieval settings:
# [plugin_docs_store]
# table_name = "plugin_docs"
# retrieval_top_k = 5
# bm25_enabled = true
# bm25_top_k = 7
# bm25_auto_create_index = true
#
# Change where uploaded-server config semantic vectors are stored:
# [server_config_semantic_store]
# db_dir = "data/server_config_semantic_vector_db"
# table_name = "server_config_semantic_memories"
#
# Expose gRPC to another machine:
# [grpc]
# host = "0.0.0.0"
# port = 50051
#
# Change where uploaded Minecraft configs are stored:
# [plugin_semantic_agent]
# mc_servers_root = "mc_servers"
#
# Change where server.id bindings are stored:
# [server_identity]
# bindings_path = "data/server_instance_bindings.json"
#
# Enable long-term memory:
# [memory]
# enabled = true
# db_path = "data/user_semantic_memory.sqlite3"
#
# Enable observability:
# [observability]
# langsmith_enabled = true
# otel_enabled = true
